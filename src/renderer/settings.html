<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Media Renamer Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h1>Media Renamer Settings</h1>
    <p class="hint">Data from <a href="https://www.themoviedb.org" target="_blank" rel="noopener">The Movie Database (TMDB)</a>. Get a free API key in your account settings.</p>

    <section>
      <label for="apiKey">TMDB API Key</label>
      <div class="row">
        <input type="password" id="apiKey" placeholder="Your API key">
        <button type="button" id="testKey">Test</button>
      </div>
      <span id="apiKeyStatus" class="status"></span>
    </section>

    <section>
      <label>Watch folders</label>
      <ul id="watchPaths"></ul>
      <button type="button" id="addFolder">Add folder</button>
    </section>

    <section>
      <label for="outputPath">Output folder (organized files)</label>
      <div class="row">
        <input type="text" id="outputPath" placeholder="Leave empty to use same as watch folder">
        <button type="button" id="pickOutput">Browse</button>
      </div>
    </section>

    <section>
      <label for="tvTemplate">TV filename template</label>
      <input type="text" id="tvTemplate" placeholder="{show}/Season {s}/{show} - S{s}E{e} - {title}.{ext}">
      <span class="help">Placeholders: {show}, {s}, {e}, {title}, {ext}</span>
    </section>

    <section>
      <label for="movieTemplate">Movie filename template</label>
      <input type="text" id="movieTemplate" placeholder="{title} ({year}).{ext}">
      <span class="help">Placeholders: {title}, {year}, {ext}</span>
    </section>

    <section class="row">
      <label class="checkbox">
        <input type="checkbox" id="watcherEnabled" checked>
        Enable folder watching
      </label>
    </section>

    <section class="row">
      <label class="checkbox">
        <input type="checkbox" id="dryRun">
        Dry run (log only, don't move files)
      </label>
    </section>

    <section>
      <button type="button" id="save">Save</button>
      <span id="saveStatus" class="status"></span>
    </section>
  </div>
  <script src="settings.js"></script>
</body>
</html>
